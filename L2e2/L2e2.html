<!DOCTYPE html>
<html>
  <head>
    <title>React-excersise</title>
  </head>
  <body>
    <div class="js-container"></div>

    <script src="https://unpkg.com/supersimpledev/react.js"></script>
    <script src="https://unpkg.com/supersimpledev/react-dom.js"></script>
    <script src="https://unpkg.com/supersimpledev/dayjs.js"></script>
    <script src="https://unpkg.com/supersimpledev/babel.js"></script>
    <script type="text/babel">
      function ProductDetails({productname,price,discount,imageSrc}){
        return (
        <div>
          <p>
            {productname}
          </p>
          <img src={imageSrc} width="150"/>
          {discount?(
            <div>
              <p>
                <del>price: ${price}</del>
              </p>
              <p>
                Discount price: ${discount}
              </p>
              </div>
              ):(
                <p>
                  price: ${price}
                </p>
              )}
              <button>
                  Add to Cart
              </button>
          </div>
        )
      }

       function App(){
        return(
          <>
            <ProductDetails

              productname="cotton socks"
              price="10.99"
              discount="5.45"
              imageSrc="cotton-socks.png"
            />
            <ProductDetails
              productname="Plain T-Shirt"
              price="7.99"
              imageSrc="plain-t-shirt.png"
            />
            <ProductDetails
              productname="Tennies balls"
              price="6.00"
              imageSrc="tennis-balls.png"
            />
          </>
          
        )
       }
       const container=document.querySelector('.js-container');
       ReactDOM.createRoot(container).render(<App/>)
    </script>
  </body>
</html>
